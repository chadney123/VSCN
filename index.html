<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>foster+freeman Visitor Kiosk</title>
    
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.5/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        :root {
            --primary: #49ae34; 
            --bg: #49ae34;
            --text: #333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            text-align: center;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 95vh;
        }
        .view { display: none; width: 100%; max-width: 600px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .active { display: block; }
        .btn {
            display: block; width: 100%; padding: 20px; margin: 15px 0;
            font-size: 1.5em; color: white; background-color: var(--primary);
            border: none; border-radius: 8px; cursor: pointer; transition: 0.3s;
        }
        .btn-secondary { background-color: #6c757d; }
        input[type="text"] { width: 90%; padding: 15px; margin: 10px 0; font-size: 1.2em; border: 1px solid #ccc; border-radius: 6px; }
        canvas { border: 2px dashed #ccc; border-radius: 8px; width: 100%; height: 200px; touch-action: none; }

        /* --- CRITICAL PRINT OVERRIDES --- */
        @media print {
            @page {
                size: 54mm 86mm;
                margin: 0;
            }
            body { background: white; padding: 0; margin: 0; }
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { 
                position: absolute; 
                left: 0; 
                top: 0; 
                width: 54mm;
                height: 86mm;
                display: block !important; 
            }
            img { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
</head>
<body>

    <div id="home-screen" class="view active">
        <img src="assets/logo.jpeg" alt="Logo" style="width: 200px; margin-bottom: 20px;">
        <h1>Welcome</h1>
        <button class="btn" onclick="showScreen('type-screen')">Sign In</button>
        <button class="btn btn-secondary" onclick="startScanner()">Sign Out</button>
    </div>

    <div id="type-screen" class="view">
        <h2>Who are you visiting as?</h2>
        <button class="btn" onclick="startForm('Visitor')">Visitor</button>
        <button class="btn" onclick="startForm('Contractor')">Contractor</button>
    </div>

    <div id="form-screen" class="view">
        <h2 id="form-title">Sign In</h2>
        <input type="text" id="name" placeholder="Full Name">
        <input type="text" id="company" placeholder="Company Name">
        <input type="text" id="contact" placeholder="F+F Contact Person">
        <canvas id="signature-pad"></canvas>
        <button class="btn" onclick="submitForm()">Continue</button>
    </div>

    <div id="thankyou-screen" class="view">
        <h2 id="thankyou-msg">Processing...</h2>
    </div>

    <div id="print-area" style="display: none;">
        <div id="label-content" style="width: 54mm; height: 86mm; border: 1.5pt solid black; box-sizing: border-box; padding: 4mm; display: flex; flex-direction: column; align-items: center; justify-content: space-between; background: white; overflow: hidden;">
            
            <img src="assets/logo.jpeg" style="width: 35mm; height: auto; margin-top: 2mm;">
            
            <div style="text-align: center; width: 100%;">
                <h2 id="lbl-name" style="margin: 0; font-size: 14pt; text-transform: uppercase; line-height: 1.2;"></h2>
                <p id="lbl-company" style="margin: 1mm 0; font-size: 10pt; font-weight: bold;"></p>
            </div>
            
            <div id="lbl-qr" style="display: block; margin: 0 auto;"></div>
            
            <div style="width: 100%; border-top: 1pt solid #000; padding-top: 1mm; margin-bottom: 2mm;">
                <p id="lbl-type" style="font-size: 8pt; margin: 0; font-weight: bold;"></p>
            </div>
        </div>
    </div>

    <script>
        let currentVisitorType = '';
        const canvas = document.getElementById('signature-pad');
        const signaturePad = new SignaturePad(canvas);

        function showScreen(screenId) {
            document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function startForm(type) {
            currentVisitorType = type;
            showScreen('form-screen');
            setTimeout(() => {
                canvas.width = canvas.offsetWidth;
                canvas.height = canvas.offsetHeight;
                signaturePad.clear();
            }, 100);
        }

        function submitForm() {
            finalizeSignIn();
        }

        async function finalizeSignIn() {
            const name = document.getElementById('name').value.trim();
            const company = document.getElementById('company').value.trim();
            
            showScreen('thankyou-screen');

            // Map data to label
            document.getElementById("lbl-name").innerText = name;
            document.getElementById("lbl-company").innerText = company;
            document.getElementById("lbl-type").innerText = "foster+freeman " + currentVisitorType;
            
            // Clear and generate QR
            const qrContainer = document.getElementById("lbl-qr");
            qrContainer.innerHTML = ""; 
            new QRCode(qrContainer, {
                text: name, 
                width: 100, // Approx 26mm
                height: 100
            });

            // Trigger Print
            setTimeout(() => {
                window.print(); 
                setTimeout(() => { showScreen('home-screen'); }, 3000);
            }, 700); 
        }
    </script>
</body>
</html>
