<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>foster+freeman Visitor Kiosk</title>
    
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.5/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        :root {
            --primary: #49ae34; 
            --bg: #49ae34;
            --text: #333;
            --accent: #2c3e50;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            text-align: center;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 95vh;
        }
        h1 { font-size: 2.5em; margin-bottom: 5px; }
        .view { display: none; width: 100%; max-width: 600px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative; z-index: 1; }
        .active { display: block; }

        .safety-notice {
            background: #fff3cd;
            color: #856404;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.95em;
            margin-bottom: 20px;
            border: 1px solid #ffeeba;
            font-weight: bold;
        }

        /* Software Design Logo Styling */
        .software-logo {
            position: fixed;
            bottom: 15px;
            right: 15px;
            width: 100px; /* Adjust size as needed */
            height: auto;
            opacity: 0.7; /* Makes it subtle/watermarked */
            z-index: 100;
            pointer-events: none; /* Prevents it from blocking button clicks */
        }

        #reader video {
            transform: scaleX(-1);
            -webkit-transform: scaleX(-1);
        }
        
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: white; width: 90%; max-width: 550px; padding: 30px; border-radius: 12px;
            max-height: 90vh; display: flex; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .progress-text { font-size: 0.9em; color: #666; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .doc-viewer-container { text-align: center; overflow-y: auto; border: 1px solid #ddd; background: #fdfdfd; flex-grow: 1; margin-bottom: 20px; border-radius: 4px; }
        .doc-viewer-container img { width: 100%; height: auto; display: block; }

        .btn { display: block; width: 100%; padding: 20px; margin: 15px 0; font-size: 1.5em; color: white; background-color: var(--primary); border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .btn:hover { background-color: #3e942c; }
        .btn-secondary { background-color: #6c757d; }
        .btn-re-signin { background-color: var(--accent); }
        .btn-half { width: 48%; display: inline-block; margin: 10px 1%; }
        .btn-accept { background-color: #28a745; }
        .btn-decline { background-color: #dc3545; }

        input[type="text"] { width: 90%; padding: 15px; margin: 10px 0; font-size: 1.2em; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        canvas { border: 2px dashed #ccc; border-radius: 8px; width: 100%; height: 200px; touch-action: none; background: #fafafa; }
        
        #camera-container { position: relative; width: 100%; max-width: 250px; margin: 10px auto; overflow: hidden; border-radius: 10px; background: #000; }
        #face-cam { width: 100%; display: block; transform: scaleX(-1); }
        #face-guide {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 130px; height: 170px; border: 4px dashed #dc3545;
            border-radius: 50%; box-sizing: border-box; pointer-events: none; transition: border-color 0.2s ease-in-out;
            display: none;
        }

        @media print {
            @page { size: 54mm 86mm; margin: 0; }
            body { background: white; padding: 0; margin: 0; }
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 54mm; height: 86mm; display: block !important; }
            .software-logo { display: none; } /* Hide watermark on the printed badge */
        }
    </style>
</head>
<body>

    <img src="assets/software-logo.png" alt="Design Logo" class="software-logo">

    <div id="home-screen" class="view active">
        <img src="assets/newlogo.jpeg" alt="Foster + Freeman Logo" style="width: 250px; margin-bottom: 5px; height: auto;">
        <h1>Welcome</h1>
        <div class="safety-notice">⚠️ Signing IN and OUT is mandatory for evacuation procedures.</div>
        <button class="btn" onclick="showScreen('type-screen')">Sign In</button>
        <button class="btn btn-secondary" onclick="startScanner('SignOut')">Sign Out</button>
        <button class="btn btn-re-signin" style="margin-top: 40px;" onclick="startScanner('ReSignIn')">🔄 Re-Sign In (Scan Badge)</button>
    </div>

    <div id="scan-screen" class="view">
        <h2 id="scan-title">Scan Badge</h2>
        <div id="safety-reminder-out" class="safety-notice" style="display:none;">Please scan out so you are accounted for in an evacuation.</div>
        <p id="scan-subtitle">Hold your badge QR code up to the camera</p>
        <div id="reader" style="width: 100%; max-width: 400px; margin: auto; border-radius: 10px; overflow: hidden; background: #000;"></div>
        <div style="margin-top: 20px;">
            <p>OR enter name manually:</p>
            <input type="text" id="scan-manual-name" placeholder="Enter Full Name">
            <button class="btn" onclick="handleScanResult(document.getElementById('scan-manual-name').value)">Confirm Sign Out</button>
        </div>
        <button class="btn btn-secondary" onclick="stopScanner(); showScreen('home-screen');">Back</button>
    </div>

    <script>
        // Copy the script block from the previous version exactly as is. 
        // Ensure you change "assets/software-logo.png" in the HTML above 
        // to match your actual logo file name.
    </script>
</body>
</html>
