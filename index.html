<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>foster+freeman Visitor Kiosk</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#49ae34">
    
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.5/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        :root {
            --primary: #49ae34; 
            --bg: #49ae34;
            --text: #333;
            --accent: #2c3e50;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            text-align: center;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 95vh;
        }
        h1 { font-size: 2.5em; margin-bottom: 5px; }
        .view { display: none; width: 100%; max-width: 600px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .active { display: block; }

        .safety-notice {
            background: #fff3cd; color: #856404; padding: 10px; border-radius: 6px;
            font-size: 0.95em; margin-bottom: 20px; border: 1px solid #ffeeba; font-weight: bold;
        }

        .software-logo {
            position: fixed; bottom: 15px; right: 15px; width: 125px; 
            height: auto; opacity: 0.9; z-index: 100; pointer-events: none; 
        }

        #reader video { transform: scaleX(-1); -webkit-transform: scaleX(-1); }
        
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: white; width: 90%; max-width: 550px; padding: 30px; border-radius: 12px;
            max-height: 90vh; display: flex; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .progress-text { font-size: 0.9em; color: #666; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .doc-viewer-container { text-align: center; overflow-y: auto; border: 1px solid #ddd; background: #fdfdfd; flex-grow: 1; margin-bottom: 20px; border-radius: 4px; }
        .doc-viewer-container img { width: 100%; height: auto; display: block; }

        .btn { display: block; width: 100%; padding: 20px; margin: 15px 0; font-size: 1.5em; color: white; background-color: var(--primary); border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .btn:hover { background-color: #3e942c; }
        .btn-secondary { background-color: #6c757d; }
        .btn-re-signin { background-color: var(--accent); }
        .btn-half { width: 48%; display: inline-block; margin: 10px 1%; }
        .btn-accept { background-color: #28a745; }
        .btn-decline { background-color: #dc3545; }

        input[type="text"] { width: 90%; padding: 15px; margin: 10px 0; font-size: 1.2em; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        canvas { border: 2px dashed #ccc; border-radius: 8px; width: 100%; height: 200px; touch-action: none; background: #fafafa; }
        
        #camera-container { position: relative; width: 100%; max-width: 250px; margin: 10px auto; overflow: hidden; border-radius: 10px; background: #000; }
        #face-cam { width: 100%; display: block; transform: scaleX(-1); }
        #face-guide {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 130px; height: 170px; border: 4px dashed #dc3545;
            border-radius: 50%; box-sizing: border-box; pointer-events: none; display: none;
        }

        @media print {
            @page { size: 60mm 86mm; margin: 0; }
            body { background: white; padding: 0; margin: 0; }
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 60mm; height: 86mm; display: block !important; }
            #label-content { width: 60mm !important; height: 86mm !important; border: none !important; }
            #lbl-qr canvas, #lbl-qr img { width: 35mm !important; height: 35mm !important; margin: 0 auto; }
            .software-logo { display: none; }
        }
    </style>
</head>
<body>

    <img src="assets/software-logo.png" alt="Design Logo" class="software-logo">

    <div id="home-screen" class="view active">
        <img src="assets/newlogo.jpeg" alt="Foster + Freeman Logo" style="width: 250px; margin-bottom: 5px; height: auto;">
        <h1>Welcome</h1>
        <div class="safety-notice">⚠️ Signing IN and OUT is mandatory for evacuation procedures.</div>
        <button class="btn" onclick="showScreen('type-screen')">Sign In</button>
        <button class="btn btn-secondary" onclick="startScanner('SignOut')">Sign Out</button>
        <button class="btn btn-re-signin" style="margin-top: 40px;" onclick="startScanner('ReSignIn')">🔄 Re-Sign In (Scan Badge)</button>
    </div>

    <div id="type-screen" class="view">
        <h2>Who are you visiting as?</h2>
        <button class="btn" onclick="startForm('Visitor')">Visitor</button>
        <button class="btn" onclick="startForm('Contractor')">Contractor</button>
        <button class="btn btn-secondary" onclick="showScreen('home-screen')">Back</button>
    </div>

    <div id="form-screen" class="view">
        <h2 id="form-title">Sign In</h2>
        <input type="text" id="name" placeholder="Full Name" required>
        <input type="text" id="company" placeholder="Company Name" required>
        <input type="text" id="vehicle" placeholder="Vehicle Registration">
        <input type="text" id="contact" placeholder="F+F Contact Person" required>
        <button class="btn" onclick="submitDetails()">Next</button>
        <button class="btn btn-secondary" onclick="showScreen('type-screen')">Cancel</button>
    </div>

    <div id="document-modal" class="modal-overlay">
        <div class="modal-content">
            <div id="doc-progress" class="progress-text">Document 1 of 4</div>
            <h2 id="doc-title" style="margin-top:5px; color: var(--accent);">Document Title</h2>
            <div id="doc-viewer" class="doc-viewer-container"><img id="doc-image" src=""></div>
            <div style="display: flex; justify-content: space-between;">
                <button class="btn btn-half btn-decline" onclick="declineTerms()">Decline</button>
                <button class="btn btn-half btn-accept" onclick="acceptCurrentDocument()">I Accept</button>
            </div>
        </div>
    </div>

    <div id="signature-screen" class="view">
        <h2>Signature</h2>
        <div id="camera-container">
            <video id="face-cam" autoplay playsinline></video>
            <div id="face-guide"></div>
        </div>
        <p id="sig-welcome" style="font-size: 1.2em;">Please sign below:</p>
        <canvas id="signature-pad"></canvas>
        <button class="btn btn-secondary" style="padding: 10px; font-size: 1em;" onclick="signaturePad.clear()">Clear</button>
        <button class="btn" onclick="finalizeSignIn()">Sign In</button>
    </div>

    <div id="thankyou-screen" class="view">
        <h2 id="thankyou-msg">Thank you!</h2>
        <p>Printing your badge automatically...</p>
    </div>

    <div id="print-area" style="display: none;">
        <div id="label-content" style="width: 60mm; height: 86mm; display: flex; flex-direction: column; align-items: center; justify-content: space-between; background: white;">
            <img src="assets/newlogo.jpeg" style="width: 48mm; height: auto;">
            <div style="text-align: center;">
                <h2 id="lbl-name" style="margin: 0; font-size: 18pt; text-transform: uppercase;"></h2>
                <p id="lbl-company" style="margin: 0; font-size: 13pt; font-weight: bold;"></p>
            </div>
            <div id="lbl-qr"></div>
            <div style="width: 100%; border-top: 1.5pt solid #000; padding-top: 2mm;">
                <p id="lbl-type" style="font-size: 12pt; margin: 0; font-weight: bold; text-transform: uppercase;"></p>
            </div>
        </div>
    </div>

    <script>
        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log("SW failed", err));
        }

        let currentVisitorType = '';
        let html5QrCode;
        let currentDocIndex = 0;
        let scanMode = ''; 
        let isReturningVisitor = false;
        let visitorData = {}; 
        const canvas = document.getElementById('signature-pad');
        const signaturePad = new SignaturePad(canvas);

        const CLOUD_URL = "https://script.google.com/macros/s/AKfycby_qooTLeemRIU2S04uBgcXUVjLUags6KRkyXJtElngDbxRA6E2nHZjYxof3RKI6RX1/exec"; 

        const contractorDocuments = [
            { title: "1. FF156 Contractors Rules", file: "assets/FF156    Contractors Rules v2.0.jpg", text: "Contractor has read and accepted the FF156 Contractors Rules." },
            { title: "2. FF157 Permit to Work", file: "assets/FF157    Permit to Work v2.0.jpg", text: "Contractor has read and accepted the FF157 Permit to Work." },
            { title: "3. FF158 Contractor H&S Induction Form", file: "assets/FF158    Contractor H&S Induction Form v4.0.jpg", text: "Contractor has read and accepted the FF158 Contractor H&S Induction Form." },
            { title: "4. RA069 SITE RA F&F", file: "assets/RA069    SITE RA F&F v8.0.jpg", text: "Contractor has read and accepted the RA069 SITE RA F&F." }
        ];

        function showScreen(screenId) {
            document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            if (screenId === 'signature-screen') {
                navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
                    .then(stream => { document.getElementById('face-cam').srcObject = stream; });
                setTimeout(resizeCanvas, 100);
            }
        }

        function resizeCanvas() {
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            canvas.width = canvas.offsetWidth * ratio; canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext("2d").scale(ratio, ratio); signaturePad.clear();
        }

        function startForm(type) {
            isReturningVisitor = false; currentVisitorType = type;
            showScreen('form-screen');
        }

        function submitDetails() {
            if (currentVisitorType === 'Contractor') { currentDocIndex = 0; loadDocument(); } 
            else { showScreen('signature-screen'); }
        }

        function loadDocument() {
            document.getElementById('doc-progress').innerText = `Document ${currentDocIndex + 1} of 4`;
            document.getElementById('doc-image').src = contractorDocuments[currentDocIndex].file;
            document.getElementById('document-modal').style.display = 'flex';
        }

        function acceptCurrentDocument() {
            currentDocIndex++;
            if (currentDocIndex < 4) { loadDocument(); } 
            else { document.getElementById('document-modal').style.display = 'none'; showScreen('signature-screen'); }
        }

        async function finalizeSignIn() {
            if(signaturePad.isEmpty()) return alert("Please sign.");
            
            visitorData = isReturningVisitor ? visitorData : {
                type: currentVisitorType,
                name: document.getElementById('name').value,
                company: document.getElementById('company').value,
                vehicle: document.getElementById('vehicle').value,
                contact: document.getElementById('contact').value
            };
            
            showScreen('thankyou-screen');
            
            // --- AUTOMATED PRINT LOGIC ---
            document.getElementById("lbl-name").innerText = visitorData.name;
            document.getElementById("lbl-company").innerText = visitorData.company;
            document.getElementById("lbl-type").innerText = "F+F " + visitorData.type;
            const qrContainer = document.getElementById("lbl-qr");
            qrContainer.innerHTML = ""; 
            new QRCode(qrContainer, { text: `${visitorData.name}|${visitorData.type}`, width: 140, height: 140 });

            // Send to Cloud in background
            fetch(CLOUD_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ ...visitorData, action: "SignIn" }) });

            // Trigger Print
            setTimeout(() => {
                if (typeof fully !== 'undefined') {
                    fully.print(); // Silent Print for Fully Kiosk
                } else {
                    window.print(); // Fallback
                }
                setTimeout(() => { location.reload(); }, 5000);
            }, 1000);
        }

        async function startScanner(mode) {
            scanMode = mode; showScreen('scan-screen');
            html5QrCode = new Html5Qrcode("reader");
            await html5QrCode.start({ facingMode: "user" }, { fps: 10, qrbox: 250 }, (text) => handleScanResult(text));
        }

        function handleScanResult(text) {
            if (html5QrCode) html5QrCode.stop();
            let parts = text.split('|');
            if (scanMode === 'SignOut') {
                fetch(CLOUD_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ name: parts[0], action: "SignOut" }) });
                document.getElementById('thankyou-msg').innerText = "Goodbye!";
                showScreen('thankyou-screen');
                setTimeout(() => { location.reload(); }, 3000);
            }
        }
    </script>
</body>
</html>
