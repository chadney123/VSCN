<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>foster+freeman Visitor Kiosk</title>
    
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.5/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        :root { --primary: #49ae34; --bg: #49ae34; --text: #333; --accent: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); text-align: center; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 95vh; }
        h1 { font-size: 2.5em; margin-bottom: 10px; }
        .view { display: none; width: 100%; max-width: 600px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .active { display: block; }
        
        .btn { display: block; width: 100%; padding: 20px; margin: 15px 0; font-size: 1.5em; color: white; background-color: var(--primary); border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .btn-secondary { background-color: #6c757d; }
        .btn-re-signin { position: fixed; bottom: 20px; right: 20px; width: auto; padding: 15px 25px; font-size: 1.1em; background-color: var(--accent); margin: 0; z-index: 100; color: white; border-radius: 8px; border: none; }

        input[type="text"] { width: 90%; padding: 15px; margin: 10px 0; font-size: 1.2em; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        canvas { border: 2px dashed #ccc; border-radius: 8px; width: 100%; height: 200px; touch-action: none; background: #fafafa; }
        
        /* Modal Induction Styling */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 90%; max-width: 550px; padding: 30px; border-radius: 12px; max-height: 90vh; display: flex; flex-direction: column; }
        .doc-viewer-container { text-align: center; overflow-y: auto; border: 1px solid #ddd; flex-grow: 1; margin-bottom: 20px; }
        .doc-viewer-container img { width: 100%; height: auto; }
        .btn-half { width: 48%; display: inline-block; margin: 10px 1%; }

        @media print {
            @page { size: 54mm 86mm; margin: 0; }
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 54mm; height: 86mm; display: block !important; }
        }
    </style>
</head>
<body>

    <div id="home-screen" class="view active">
        <img src="assets/logo.jpeg" alt="Logo" style="width: 250px; margin-bottom: 5px;">
        <h1>Welcome</h1>
        <button class="btn" onclick="showScreen('type-screen')">Sign In</button>
        <button class="btn btn-secondary" onclick="startScanner('SignOut')">Sign Out</button>
        <button class="btn btn-re-signin" onclick="startScanner('ReSignIn')">🔄 Re-Sign In (Scan Badge)</button>
    </div>

    <div id="type-screen" class="view">
        <h2>Who are you visiting as?</h2>
        <button class="btn" onclick="startForm('Visitor')">Visitor</button>
        <button class="btn" onclick="startForm('Contractor')">Contractor</button>
        <button class="btn btn-secondary" onclick="showScreen('home-screen')">Back</button>
    </div>

    <div id="form-screen" class="view">
        <h2 id="form-title">Sign In</h2>
        <input type="text" id="name" placeholder="Full Name">
        <input type="text" id="company" placeholder="Company Name">
        <input type="text" id="vehicle" placeholder="Vehicle Registration">
        <input type="text" id="contact" placeholder="F+F Contact Person">
        <button class="btn" onclick="submitDetails()">Next</button>
        <button class="btn btn-secondary" onclick="showScreen('home-screen')">Cancel</button>
    </div>

    <div id="signature-screen" class="view">
        <h2 id="sig-welcome">Signature</h2>
        <p>Please sign below to complete your entry:</p>
        <canvas id="signature-pad"></canvas>
        <button class="btn" onclick="finalizeSignIn()">Complete Sign In</button>
        <button class="btn btn-secondary" onclick="signaturePad.clear()">Clear</button>
    </div>

    <div id="scan-screen" class="view">
        <h2 id="scan-title">Scan Badge</h2>
        <div id="reader" style="width: 100%; max-width: 400px; margin: auto; border-radius: 10px; overflow: hidden; background: #000;"></div>
        <button class="btn btn-secondary" onclick="stopScanner()">Back</button>
    </div>

    <div id="thankyou-screen" class="view">
        <h2 id="thankyou-msg">Thank you!</h2>
        <p>Returning to home screen shortly...</p>
    </div>

    <div id="document-modal" class="modal-overlay">
        <div class="modal-content">
            <div id="doc-progress"></div>
            <h2 id="doc-title"></h2>
            <div id="doc-viewer" class="doc-viewer-container"><img id="doc-image" src=""></div>
            <div style="display: flex; justify-content: space-between;">
                <button class="btn btn-half btn-secondary" onclick="location.reload()">Decline</button>
                <button class="btn btn-half" onclick="acceptCurrentDocument()">I Accept</button>
            </div>
        </div>
    </div>

    <div id="print-area" style="display: none;">
        <div id="label-content" style="width: 54mm; height: 86mm; border: 1pt solid black; padding: 4mm; display: flex; flex-direction: column; align-items: center; justify-content: space-between; background: white;">
            <img src="assets/logo.jpeg" style="width: 35mm; height: auto;">
            <div style="text-align: center;">
                <h2 id="lbl-name" style="margin: 0; font-size: 14pt; text-transform: uppercase;"></h2>
                <p id="lbl-company" style="margin: 1mm 0; font-size: 10pt; font-weight: bold;"></p>
            </div>
            <div id="lbl-qr"></div>
            <p id="lbl-type" style="font-size: 8pt; font-weight: bold; border-top: 1pt solid black; width: 100%;"></p>
        </div>
    </div>

    <script>
        let visitorData = {};
        let html5QrCode;
        let currentDocIndex = 0;
        let isReturningVisitor = false;
        const canvas = document.getElementById('signature-pad');
        const signaturePad = new SignaturePad(canvas);

        const CLOUD_URL = "YOUR_GOOGLE_APPS_SCRIPT_URL_HERE"; 
        const docs = [
            { title: "FF156 Contractors Rules", file: "assets/FF156   Contractors Rules v2.0.jpg" },
            { title: "FF157 Permit to Work", file: "assets/FF157   Permit to Work.jpg" },
            { title: "FF158 Contractor H&S Induction", file: "assets/FF158   Contractor H&S Induction Form.jpg" }
        ];

        function showScreen(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function startForm(type) {
            isReturningVisitor = false;
            visitorData = { type: type };
            document.getElementById('form-title').innerText = type + ' Sign In';
            showScreen('form-screen');
        }

        async function startScanner(mode) {
            document.getElementById('scan-title').innerText = (mode === 'SignOut') ? "Sign Out" : "Re-Sign In";
            showScreen('scan-screen');
            html5QrCode = new Html5Qrcode("reader");
            await html5QrCode.start({ facingMode: "user" }, { fps: 10, qrbox: 250 }, (text) => {
                html5QrCode.stop();
                let p = text.split('|');
                visitorData = { name: p[0], type: p[1], company: p[2], vehicle: p[3], contact: p[4] };
                if (mode === 'SignOut') {
                    sendToCloud(visitorData, "SignOut");
                    showThankYou("Goodbye " + p[0]);
                } else {
                    isReturningVisitor = true;
                    document.getElementById('sig-welcome').innerText = "Welcome back, " + p[0];
                    showScreen('signature-screen');
                    setTimeout(() => { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; signaturePad.clear(); }, 100);
                }
            });
        }

        function submitDetails() {
            visitorData.name = document.getElementById('name').value;
            visitorData.company = document.getElementById('company').value;
            visitorData.vehicle = document.getElementById('vehicle').value;
            visitorData.contact = document.getElementById('contact').value;
            if(!visitorData.name || !visitorData.company) return alert("Missing details");

            if (visitorData.type === 'Contractor') {
                currentDocIndex = 0; loadDoc();
            } else {
                showScreen('signature-screen');
                setTimeout(() => { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; signaturePad.clear(); }, 100);
            }
        }

        function loadDoc() {
            const d = docs[currentDocIndex];
            document.getElementById('doc-progress').innerText = `Document ${currentDocIndex+1} of 3`;
            document.getElementById('doc-title').innerText = d.title;
            document.getElementById('doc-image').src = d.file;
            document.getElementById('document-modal').style.display = 'flex';
        }

        function acceptCurrentDocument() {
            currentDocIndex++;
            if (currentDocIndex < 3) loadDoc();
            else {
                document.getElementById('document-modal').style.display = 'none';
                showScreen('signature-screen');
                setTimeout(() => { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; signaturePad.clear(); }, 100);
            }
        }

        function finalizeSignIn() {
            if(signaturePad.isEmpty()) return alert("Please sign");
            visitorData.signature = signaturePad.toDataURL();
            sendToCloud(visitorData, "SignIn");
            
            if (!isReturningVisitor) {
                document.getElementById("lbl-name").innerText = visitorData.name;
                document.getElementById("lbl-company").innerText = visitorData.company;
                document.getElementById("lbl-type").innerText = "F+F " + visitorData.type;
                const qrStr = `${visitorData.name}|${visitorData.type}|${visitorData.company}|${visitorData.vehicle}|${visitorData.contact}`;
                document.getElementById("lbl-qr").innerHTML = "";
                new QRCode(document.getElementById("lbl-qr"), { text: qrStr, width: 60, height: 60 });
                window.print();
            }
            showThankYou("Thank you " + visitorData.name);
        }

        function showThankYou(msg) {
            document.getElementById('thankyou-msg').innerText = msg;
            showScreen('thankyou-screen');
            setTimeout(() => location.reload(), 4000);
        }

        function stopScanner() { if(html5QrCode) html5QrCode.stop().then(()=>location.reload()); else location.reload(); }
        function sendToCloud(data, action) { if (CLOUD_URL !== "YOUR_URL") fetch(CLOUD_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ ...data, action: action }) }); }
    </script>
</body>
</html>
