<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>foster+freeman Visitor Kiosk</title>
    
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.5/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        :root {
            --primary: #49ae34; 
            --bg: #49ae34;
            --text: #333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            text-align: center;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 95vh;
        }
        h1 { font-size: 2.5em; margin-bottom: 10px; }
        .view { display: none; width: 100%; max-width: 600px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .active { display: block; }
        .btn {
            display: block; width: 100%; padding: 20px; margin: 15px 0;
            font-size: 1.5em; color: white; background-color: var(--primary);
            border: none; border-radius: 8px; cursor: pointer; transition: 0.3s;
        }
        .btn:hover { background-color: #8ebd84; }
        .btn-secondary { background-color: #6c757d; }
        
        .btn-half {
            width: 48%;
            display: inline-block;
            margin: 10px 1%;
        }
        .btn-accept { background-color: #28a745; }
        .btn-decline { background-color: #dc3545; }

        input[type="text"] {
            width: 90%; padding: 15px; margin: 10px 0; font-size: 1.2em;
            border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box;
        }
        canvas { border: 2px dashed #ccc; border-radius: 8px; width: 100%; height: 200px; touch-action: none; }
        .label { text-align: left; font-weight: bold; margin-top: 10px; display: block; }
        
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { 
                position: absolute; 
                left: 0; 
                top: 0; 
                display: block !important; 
            }
            img {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }
    </style>
</head>
<body>

    <div id="home-screen" class="view active">
        <img src="assets/logo.jpeg" alt="Logo" style="width: 250px; margin-bottom: 5px; height: auto;">
        <h1>Welcome</h1>
        <button class="btn" onclick="showScreen('type-screen')">Sign In</button>
        <button class="btn btn-secondary" onclick="startScanner()">Sign Out</button>
    </div>

    <div id="type-screen" class="view">
        <h2>Who are you visiting as?</h2>
        <button class="btn" onclick="startForm('Visitor')">Visitor</button>
        <button class="btn" onclick="startForm('Contractor')">Contractor</button>
        <button class="btn btn-secondary" onclick="showScreen('home-screen')">Back</button>
    </div>

    <div id="form-screen" class="view">
        <h2 id="form-title">Sign In</h2>
        <input type="text" id="name" placeholder="Full Name" required>
        <input type="text" id="company" placeholder="Company Name" required>
        <input type="text" id="vehicle" placeholder="Vehicle Registration">
        <input type="text" id="contact" placeholder="F+F Contact Person" required>
        
        <span class="label">Please Sign Below:</span>
        <canvas id="signature-pad"></canvas>
        <button class="btn btn-secondary" style="padding: 10px; font-size: 1em; margin-top: 10px;" onclick="signaturePad.clear()">Clear Signature</button>

        <button class="btn" onclick="submitForm()">Continue</button>
        <button class="btn btn-secondary" onclick="showScreen('type-screen')">Cancel</button>
    </div>

    <div id="terms-screen" class="view">
        <h2>Contractor Safety & Terms</h2>
        <div style="height: 40vh; overflow-y: scroll; border: 1px solid #ccc; padding: 15px; font-size: 1em; background: #fff; border-radius: 6px; text-align: left; line-height: 1.5;">
            <p><strong>1. Safety Induction</strong><br>Follow protocols at all times.</p>
            <p><strong>2. Liability</strong><br>Contractor assumes full responsibility.</p>
            <p><strong>3. Work Permits</strong><br>Required for hazardous tasks.</p>
        </div>
        <div style="margin-top: 20px;">
            <button class="btn btn-half btn-accept" onclick="acceptTerms()">I Accept</button>
            <button class="btn btn-half btn-decline" onclick="declineTerms()">Decline</button>
        </div>
    </div>

    <div id="signout-screen" class="view">
        <h2>Sign Out</h2>
        <div id="reader" style="width: 100%; max-width: 400px; margin: auto; border-radius: 10px; overflow: hidden; background: #000;"></div>
        <div style="margin-top: 20px;">
            <input type="text" id="signout-name" placeholder="Enter Name">
            <button class="btn" onclick="processSignOut(document.getElementById('signout-name').value)">Sign Out</button>
        </div>
        <button class="btn btn-secondary" onclick="stopScanner()">Back</button>
    </div>

    <div id="thankyou-screen" class="view">
        <h2 id="thankyou-msg">Thank you!</h2>
    </div>

    <div id="print-area" style="display: none;">
        <div id="label-content" style="width: 204px; height: 325px; border: 1px solid #000; padding: 5px; box-sizing: border-box; text-align: center; font-family: Arial, sans-serif; background: white; overflow: hidden;">
            
            <img src="assets/logo.jpeg" style="width: 100px; height: auto; margin: 0 auto 2px auto; display: block;">
            
            <h2 id="lbl-name" style="margin: 0; font-size: 16px; line-height: 1.1; text-transform: uppercase; color: #000;"></h2>
            
            <p id="lbl-company" style="margin: 0; font-size: 11px; font-weight: bold; color: #333;"></p>
            
            <div id="lbl-qr" style="display: flex; justify-content: center; margin-top: 2px;"></div>
            
            <p id="lbl-type" style="font-size: 9px; margin-top: 3px; border-top: 1px solid #eee; padding-top: 2px; font-weight: bold;"></p>
        </div>
    </div>

    <script>
        let currentVisitorType = '';
        let html5QrCode;
        const canvas = document.getElementById('signature-pad');
        const signaturePad = new SignaturePad(canvas);
        const CLOUD_URL = "YOUR_GOOGLE_APPS_SCRIPT_URL_HERE"; 

        function showScreen(screenId) {
            document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function resizeCanvas() {
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext("2d").scale(ratio, ratio);
            signaturePad.clear(); 
        }
        window.onresize = resizeCanvas;
        resizeCanvas();

        function startForm(type) {
            currentVisitorType = type;
            document.getElementById('form-title').innerText = type + ' Sign In';
            document.getElementById('name').value = '';
            document.getElementById('company').value = '';
            document.getElementById('vehicle').value = '';
            document.getElementById('contact').value = '';
            signaturePad.clear();
            showScreen('form-screen');
            setTimeout(resizeCanvas, 100); 
        }

        async function generateContractorPDF(data) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const logoImg = new Image();
            logoImg.src = 'assets/logo.jpeg';
            doc.addImage(logoImg, 'PNG', 85, 5, 40, 15); 
            doc.text(`Name: ${data.name}`, 20, 60);
            doc.addImage(data.signature, 'PNG', 20, 165, 70, 30); 
            return doc.output('datauristring').split(',')[1]; 
        }

        async function sendToCloud(data, pdfBase64, action = "SignIn") {
            if (CLOUD_URL === "YOUR_GOOGLE_APPS_SCRIPT_URL_HERE") return;
            const payload = { ...data, action: action, pdf: pdfBase64 };
            try { await fetch(CLOUD_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) }); } catch (err) {}
        }

        function submitForm() {
            const name = document.getElementById('name').value.trim();
            const company = document.getElementById('company').value.trim();
            const contact = document.getElementById('contact').value.trim();
            if(!name || !company || !contact || signaturePad.isEmpty()) {
                alert("Please fill in all fields and sign.");
                return;
            }
            if (currentVisitorType === 'Contractor') { showScreen('terms-screen'); } 
            else { finalizeSignIn(); }
        }

        function declineTerms() { showScreen('type-screen'); }
        function acceptTerms() { finalizeSignIn(); }

        async function finalizeSignIn() {
            const data = {
                type: currentVisitorType,
                name: document.getElementById('name').value.trim(),
                company: document.getElementById('company').value.trim(),
                vehicle: document.getElementById('vehicle').value.trim(),
                contact: document.getElementById('contact').value.trim(),
                signature: signaturePad.toDataURL() 
            };

            showScreen('thankyou-screen');

            let pdfStr = (currentVisitorType === 'Contractor') ? await generateContractorPDF(data) : null;
            sendToCloud(data, pdfStr, "SignIn");

            // Setup Print Label
            document.getElementById("lbl-name").innerText = data.name;
            document.getElementById("lbl-company").innerText = data.company;
            document.getElementById("lbl-type").innerText = "foster+freeman " + currentVisitorType;
            
            const qrContainer = document.getElementById("lbl-qr");
            qrContainer.innerHTML = ""; 
            new QRCode(qrContainer, {
                text: data.name, 
                width: 60, 
                height: 60
            });

            setTimeout(() => {
                window.print(); 
                setTimeout(() => { showScreen('home-screen'); }, 3000);
            }, 500); 
        }

        async function startScanner() {
            showScreen('signout-screen');
            html5QrCode = new Html5Qrcode("reader");
            try {
                await html5QrCode.start({ facingMode: "user" }, { fps: 10, qrbox: 250 }, (decodedText) => {
                    processSignOut(decodedText); 
                    stopScanner();
                });
            } catch (err) {}
        }

        function stopScanner() {
            if (html5QrCode && html5QrCode.isScanning) {
                html5QrCode.stop().then(() => { html5QrCode.clear(); showScreen('home-screen'); });
            } else { showScreen('home-screen'); }
        }

        function processSignOut(identifier) {
            sendToCloud({ name: identifier, type: "Unknown" }, null, "SignOut");
            document.getElementById('thankyou-msg').innerText = "Goodbye!";
            showScreen('thankyou-screen');
            setTimeout(() => { showScreen('home-screen'); }, 3000);
        }
    </script>
</body>
</html>
